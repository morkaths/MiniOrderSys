spring:
    application:
        name: MiniOrderSys
    datasource:
        url: jdbc:h2:mem:miniordersys;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
        driver-class-name: org.h2.Driver
        username: sa
        password:
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
    h2:
        console:
            enabled: true
            path: /h2-console

app:
    jwt:
        secret: NHAT_TRUONG_DEP_TRAI_VO_DICH_VU_TRU_SIEU_CAP_VIP_PRO_MAX_GALAXY_ULTRA_PLUS_PLUS
        expiration-ms: 86400000
